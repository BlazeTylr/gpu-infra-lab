apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gpu-operator
  namespace: argocd
  # GPU Operator manages the full NVIDIA software stack on Kubernetes:
  # - Container toolkit (nvidia-container-toolkit)
  # - Device plugin (exposes nvidia.com/gpu resource to Kubernetes scheduler)
  # - DCGM Exporter (GPU metrics -> Prometheus)
  # - GFD (GPU Feature Discovery -- adds GPU labels to nodes)
  # Driver management is disabled because the host driver (580.x) is pre-installed.
spec:
  project: default
  source:
    repoURL: https://helm.ngc.nvidia.com/nvidia
    chart: gpu-operator
    targetRevision: v26.3.0
    helm:
      values: |
        operator:
          defaultRuntime: containerd
        driver:
          enabled: false
        toolkit:
          enabled: true
          env:
            - name: CONTAINERD_CONFIG
              value: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
            - name: CONTAINERD_SOCKET
              value: /run/k3s/containerd/containerd.sock
            - name: CONTAINERD_RUNTIME_CLASS
              value: nvidia
            - name: CONTAINERD_SET_AS_DEFAULT
              value: "true"
        devicePlugin:
          enabled: true
        dcgm:
          enabled: true
        dcgmExporter:
          enabled: true
        gfd:
          enabled: true
        migManager:
          enabled: false
        nodeStatusExporter:
          enabled: true
        validator:
          plugin:
            env:
              - name: WITH_WORKLOAD
                value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: gpu-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
